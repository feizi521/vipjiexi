<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 小狐狸工具站</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }
        .tool-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background: #f8f9fa;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .alert {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center">后台管理 - 工具配置</h1>
        
        <!-- 操作结果提示 -->
        <div id="message" class="alert" style="display: none;"></div>
        
        <!-- 工具列表 -->
        <div class="mb-4">
            <h3>工具列表</h3>
            <div id="toolsList"></div>
        </div>
        
        <!-- 添加/编辑工具表单 -->
        <div class="mb-4">
            <h3>添加/编辑工具</h3>
            <form id="toolForm">
                <div class="form-group">
                    <label for="toolId">工具ID:</label>
                    <input type="text" class="form-control" id="toolId" placeholder="例如: vip">
                </div>
                <div class="form-group">
                    <label for="toolIcon">工具图标:</label>
                    <input type="text" class="form-control" id="toolIcon" placeholder="例如: 🎬">
                </div>
                <div class="form-group">
                    <label for="toolTitle">工具标题:</label>
                    <input type="text" class="form-control" id="toolTitle" placeholder="例如: VIP视频解析">
                </div>
                <div class="form-group">
                    <label for="toolDescription">工具描述:</label>
                    <textarea class="form-control" id="toolDescription" rows="3" placeholder="例如: 支持爱奇艺、优酷、腾讯等VIP视频解析"></textarea>
                </div>
                <div class="text-center">
                    <button type="button" class="btn btn-primary" onclick="addTool()">添加工具</button>
                    <button type="button" class="btn btn-success" onclick="updateTool()">更新工具</button>
                    <button type="button" class="btn btn-danger" onclick="deleteTool()">删除工具</button>
                    <button type="reset" class="btn btn-default">重置</button>
                </div>
            </form>
        </div>
        
        <!-- API 说明 -->
        <div class="mb-4">
            <h3>API 说明</h3>
            <div class="alert alert-info">
                <h4>认证</h4>
                <p>所有API请求需要在请求头中添加: <code>Authorization: Bearer admin123</code></p>
                <h4>API 端点</h4>
                <ul>
                    <li><code>GET /api/tools</code> - 获取所有工具</li>
                    <li><code>POST /api/tools</code> - 添加新工具</li>
                    <li><code>PUT /api/tools</code> - 更新工具</li>
                    <li><code>DELETE /api/tools</code> - 删除工具</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        // API 基础 URL
        const API_BASE = 'https://jiexihoutai.farholme.com';
        
        // 认证令牌
        const TOKEN = 'admin123';
        
        // 页面加载时获取工具列表
        window.onload = function() {
            getTools();
        };
        
        // 显示消息
        function showMessage(message, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `alert alert-${type}`;
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
        
        // 获取工具列表
        async function getTools() {
            try {
                const response = await fetch(`${API_BASE}/api/tools`, {
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to get tools');
                }
                
                const tools = await response.json();
                displayTools(tools);
            } catch (error) {
                showMessage('获取工具列表失败: ' + error.message, 'danger');
            }
        }
        
        // 显示工具列表
        function displayTools(tools) {
            const toolsList = document.getElementById('toolsList');
            toolsList.innerHTML = '';
            
            for (const [id, tool] of Object.entries(tools)) {
                const toolCard = document.createElement('div');
                toolCard.className = 'tool-card';
                toolCard.innerHTML = `
                    <h4>${tool.icon} ${tool.title}</h4>
                    <p>${tool.description}</p>
                    <p><strong>ID:</strong> ${id}</p>
                    <button class="btn btn-sm btn-primary" onclick="editTool('${id}')">编辑</button>
                    <button class="btn btn-sm btn-danger" onclick="confirmDelete('${id}')">删除</button>
                `;
                toolsList.appendChild(toolCard);
            }
        }
        
        // 编辑工具
        async function editTool(toolId) {
            try {
                const response = await fetch(`${API_BASE}/api/tools`, {
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to get tools');
                }
                
                const tools = await response.json();
                const tool = tools[toolId];
                
                if (tool) {
                    document.getElementById('toolId').value = toolId;
                    document.getElementById('toolIcon').value = tool.icon;
                    document.getElementById('toolTitle').value = tool.title;
                    document.getElementById('toolDescription').value = tool.description;
                }
            } catch (error) {
                showMessage('获取工具信息失败: ' + error.message, 'danger');
            }
        }
        
        // 确认删除
        function confirmDelete(toolId) {
            if (confirm('确定要删除这个工具吗？')) {
                deleteToolById(toolId);
            }
        }
        
        // 删除工具
        function deleteTool() {
            const toolId = document.getElementById('toolId').value;
            if (!toolId) {
                showMessage('请输入工具ID', 'warning');
                return;
            }
            deleteToolById(toolId);
        }
        
        // 根据ID删除工具
        async function deleteToolById(toolId) {
            try {
                const response = await fetch(`${API_BASE}/api/tools`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: JSON.stringify({ id: toolId })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to delete tool');
                }
                
                const result = await response.json();
                if (result.success) {
                    showMessage('工具删除成功', 'success');
                    getTools();
                    document.getElementById('toolForm').reset();
                }
            } catch (error) {
                showMessage('删除工具失败: ' + error.message, 'danger');
            }
        }
        
        // 添加工具
        async function addTool() {
            const toolId = document.getElementById('toolId').value;
            const toolIcon = document.getElementById('toolIcon').value;
            const toolTitle = document.getElementById('toolTitle').value;
            const toolDescription = document.getElementById('toolDescription').value;
            
            if (!toolId || !toolTitle) {
                showMessage('请填写工具ID和标题', 'warning');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/tools`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: JSON.stringify({
                        id: toolId,
                        icon: toolIcon,
                        title: toolTitle,
                        description: toolDescription
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to add tool');
                }
                
                const result = await response.json();
                if (result.success) {
                    showMessage('工具添加成功', 'success');
                    getTools();
                    document.getElementById('toolForm').reset();
                }
            } catch (error) {
                showMessage('添加工具失败: ' + error.message, 'danger');
            }
        }
        
        // 更新工具
        async function updateTool() {
            const toolId = document.getElementById('toolId').value;
            const toolIcon = document.getElementById('toolIcon').value;
            const toolTitle = document.getElementById('toolTitle').value;
            const toolDescription = document.getElementById('toolDescription').value;
            
            if (!toolId) {
                showMessage('请输入工具ID', 'warning');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/tools`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: JSON.stringify({
                        id: toolId,
                        icon: toolIcon,
                        title: toolTitle,
                        description: toolDescription
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to update tool');
                }
                
                const result = await response.json();
                if (result.success) {
                    showMessage('工具更新成功', 'success');
                    getTools();
                }
            } catch (error) {
                showMessage('更新工具失败: ' + error.message, 'danger');
            }
        }
    </script>
</body>
</html>
