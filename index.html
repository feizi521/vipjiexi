<script>
  function setApi(){
    $("#api").children().remove();
  var apilist = $("#apiList").val().split(/\r?\n/);
  for(var i=0;i<apilist.length;i++){
    $("#api").append("<option>"+apilist[i]+"</option>");
  }
  }
$("#apiList").blur(function(){
  setApi();
  $.cookie("apiList",$("#apiList").val());
});
$("#play").click(function(){
  $api = $("#api").val();
  $url = $("#url").val();
  if($url == "" || $url == null || !/^http.*$/.test($url)){
    alert('视频地址不正确！');
    return;
  }
  if($url == "" || $url == null || !/^http.*=$/.test($api)){
    alert('无效API！');
    return;
  }
  window.open($api+$url);
});
  function init(){
    var ckapi = $.cookie("apiList");
    if(ckapi && ckapi != ""){
      $("#apiList").val(ckapi);
    }
    setApi();
  }
  init();
  function setDefault(){
    $.cookie("apiList","");
    window.location.reload();
  }
  
  // Tab切换功能
  function switchTab(tab) {
    if(tab === 'vip') {
      $('#vip-section').show();
      $('#short-section').hide();
      $('#tab-vip').addClass('btn-primary active').removeClass('btn-secondary');
      $('#tab-short').addClass('btn-secondary').removeClass('btn-primary active');
    } else {
      $('#vip-section').hide();
      $('#short-section').show();
      $('#tab-short').addClass('btn-primary active').removeClass('btn-secondary');
      $('#tab-vip').addClass('btn-secondary').removeClass('btn-primary active');
    }
  }
  
  // 短视频解析功能
  let isParsing = false;
  async function parseShortVideo() {
    if(isParsing) return;
    isParsing = true;
    
    const parseBtn = document.getElementById('parseShort');
    parseBtn.disabled = true;
    parseBtn.style.opacity = '0.6';
    
    try {
      const input = document.getElementById('shortUrl');
      const url = input.value.trim();
      
      if(!url || !/^http.*$/.test(url)) {
        alert('🚨 请输入有效的短视频链接哦～');
        return;
      }
      
      // 显示加载动画
      $('#shortLoading').show();
      $('#shortResult').empty();
      
      // 调用解析API
      const apiUrl = `https://api.kxzjoker.cn/api/jiexi_video?url=${encodeURIComponent(url)}`;
      const response = await fetch(apiUrl);
      
      if(!response.ok) {
        throw new Error(`API请求失败: ${response.status}`);
      }
      
      const data = await response.json();
      
      if(!data || (data.success !== 200 && data.success !== true)) {
        throw new Error('解析失败，请检查链接是否正确');
      }
      
      // 渲染结果
      renderShortResult(data.data);
      
    } catch(error) {
      console.error('解析错误:', error);
      alert('❌ 解析失败: ' + error.message);
    } finally {
      $('#shortLoading').hide();
      parseBtn.disabled = false;
      parseBtn.style.opacity = '1';
      isParsing = false;
    }
  }
  
  // 渲染短视频解析结果
  function renderShortResult(data) {
    const resultBox = document.getElementById('shortResult');
    
    if(data.video_url) {
      // 视频结果
      resultBox.innerHTML = `
        <div class="card shadow-sm" style="border-radius: 15px; overflow: hidden;">
          <div class="card-header bg-success text-white">
            <h5 class="mb-0"><i class="fas fa-video"></i> ${data.video_title || '未命名视频'}</h5>
          </div>
          <div class="card-body">
            <div style="position: relative; padding-top: 56.25%; margin-bottom: 15px;">
              <video controls style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 10px;">
                <source src="${data.video_url}" type="video/mp4">
                您的浏览器不支持视频播放
              </video>
            </div>
            <div class="text-center">
              <a href="${data.download_url || data.video_url}" target="_blank" class="btn btn-success btn-round">
                <i class="fas fa-download"></i> 下载视频
              </a>
            </div>
          </div>
        </div>
      `;
    } else if(data.images) {
      // 图集结果
      const galleryHTML = data.images.map((img, index) => `
        <div class="col-6 col-md-4 col-lg-3 mb-3">
          <div style="position: relative; border-radius: 10px; overflow: hidden;">
            <img src="${img}" alt="图集 ${index + 1}" style="width: 100%; aspect-ratio: 1/1; object-fit: cover;">
            <span class="badge badge-primary" style="position: absolute; top: 5px; left: 5px;">${index + 1}</span>
          </div>
        </div>
      `).join('');
      
      resultBox.innerHTML = `
        <div class="card shadow-sm" style="border-radius: 15px;">
          <div class="card-header bg-info text-white">
            <h5 class="mb-0"><i class="fas fa-images"></i> ${data.title || '未命名图集'}</h5>
          </div>
          <div class="card-body">
            <div class="row">
              ${galleryHTML}
            </div>
          </div>
        </div>
      `;
    } else {
      resultBox.innerHTML = '<div class="alert alert-warning">未找到可下载的内容</div>';
    }
  }
