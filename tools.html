<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具详情 - 小狐狸工具站</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .bg-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
        
        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .tool-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .tool-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .tool-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        
        .tool-description {
            font-size: 16px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .tool-panel {
            display: none;
        }
        
        .tool-panel.active {
            display: block;
        }
        
        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                margin: 30px;
                padding: 20px;
            }
            
            .tool-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景图片 -->
    <div class="bg-container">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920&q=80" alt="海边日落风景">
    </div>
    <div class="bg-overlay"></div>

    <div class="container">
        <div class="tool-header">
            <div class="tool-icon" id="toolIcon">📦</div>
            <h1 class="tool-title" id="toolTitle">工具详情</h1>
            <p class="tool-description" id="toolDescription">正在加载工具...</p>
        </div>

        <!-- 工具面板 - 所有工具的面板都在这里 -->
        <div class="tool-panels">
            <!-- VIP视频解析 -->
            <div class="tool-panel" id="panel-vip">
                <div class="form-group">
                    <label for="vip-api">视频解析API:</label>
                    <select class="form-control" id="vip-api">
                        <option value="https://jxnfv.com/?url=">jxnfv</option>
                        <option value="https://www.jxlao.com/jx?url=">jxlao</option>
                        <option value="https://api.03964.com/vip/?url=">03964</option>
                        <option value="https://www.vipjiexi.com/yun?url=">vipjiexi</option>
                        <option value="https://api.baiyug.cn/vip/?url=">baiyug</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="vip-url" class="lang-text" data-simplified="视频地址" data-traditional="視頻地址">视频地址</label>:
                    <input type="text" class="form-control" id="vip-url" placeholder="请输入视频播放地址" style="width: 100%">
                </div>
                <button class="btn btn-primary btn-block" onclick="startVipParse()" style="background: linear-gradient(135deg, #667eea, #764ba2); border: none; padding: 12px; font-size: 16px; font-weight: 600;">
                    <span class="lang-text" data-simplified="开始解析" data-traditional="開始解析">开始解析</span>
                </button>
                <div class="alert alert-info mt-3" role="alert">
                    <span class="lang-text" data-simplified="支持爱奇艺、优酷、腾讯等VIP视频解析，视频解析项目仅供学习使用，点击开始解析即可。" data-traditional="支持愛奇藝、優酷、騰訊等VIP視頻解析，視頻解析項目僅供學習使用，點擊開始解析即可。">支持爱奇艺、优酷、腾讯等VIP视频解析，视频解析项目仅供学习使用，点击开始解析即可。</span>
                </div>
            </div>

            <!-- 其他工具面板 -->
            <div class="tool-panel" id="panel-base64">
                <!-- Base64转换工具内容 -->
                <div class="form-group">
                    <label for="base64Input">输入文本:</label>
                    <textarea class="form-control" id="base64Input" rows="4" placeholder="请输入要转换的文本"></textarea>
                </div>
                <div class="form-group">
                    <label for="base64Output">转换结果:</label>
                    <textarea class="form-control" id="base64Output" rows="4" readonly></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <button class="btn btn-primary btn-block" onclick="base64Encode()">编码</button>
                    </div>
                    <div class="col-md-6">
                        <button class="btn btn-success btn-block" onclick="base64Decode()">解码</button>
                    </div>
                </div>
            </div>

            <!-- 这里可以添加其他工具面板 -->
        </div>

        <a href="index.html" class="back-button">返回工具箱</a>
    </div>

    <script>
        // 获取URL参数中的工具ID
        function getToolId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('tool') || 'vip';
        }

        // 工具配置
        const toolsConfig = {
            vip: {
                icon: '🎬',
                title: 'VIP视频解析',
                description: '支持爱奇艺、优酷、腾讯等VIP视频解析'
            },
            base64: {
                icon: '🔢',
                title: 'Base64转换',
                description: '在线Base64编码和解码工具'
            },
            // 这里可以添加其他工具的配置
        };

        // 初始化工具页面
        function initToolPage() {
            const toolId = getToolId();
            const config = toolsConfig[toolId] || toolsConfig.vip;
            
            // 更新页面标题和描述
            document.getElementById('toolIcon').textContent = config.icon;
            document.getElementById('toolTitle').textContent = config.title;
            document.getElementById('toolDescription').textContent = config.description;
            document.title = config.title + ' - 小狐狸VIP视频解析网';
            
            // 显示对应的工具面板
            document.querySelectorAll('.tool-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            const targetPanel = document.getElementById('panel-' + toolId);
            if (targetPanel) {
                targetPanel.classList.add('active');
            } else {
                // 如果工具不存在，显示VIP解析
                document.getElementById('panel-vip').classList.add('active');
            }
        }

        // VIP视频解析功能
        function startVipParse() {
            const api = document.getElementById('vip-api').value;
            const url = document.getElementById('vip-url').value;
            if (!url) {
                alert('请输入视频地址');
                return;
            }
            window.open(api + url, '_blank');
        }

        // Base64转换功能
        function base64Encode() {
            const input = document.getElementById('base64Input').value;
            try {
                const encoded = btoa(unescape(encodeURIComponent(input)));
                document.getElementById('base64Output').value = encoded;
            } catch(e) {
                document.getElementById('base64Output').value = '编码错误: ' + e.message;
            }
        }

        function base64Decode() {
            const input = document.getElementById('base64Input').value;
            try {
                const decoded = decodeURIComponent(escape(atob(input)));
                document.getElementById('base64Output').value = decoded;
            } catch(e) {
                document.getElementById('base64Output').value = '解码错误: ' + e.message;
            }
        }

        // 页面加载完成后初始化
        window.onload = function() {
            initToolPage();
        };
    </script>
</body>
</html>
