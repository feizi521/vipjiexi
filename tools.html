<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具详情 - 小狐狸工具站</title>
    <!-- HTTPS强制跳转 -->
    <script>
      if (window.location.protocol === 'http:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        window.location.href = window.location.href.replace('http:', 'https:');
      }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .bg-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
        
        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .tool-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .tool-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .tool-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        
        .tool-description {
            font-size: 16px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .tool-panel {
            display: none;
        }
        
        .tool-panel.active {
            display: block;
        }
        
        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                margin: 30px;
                padding: 20px;
            }
            
            .tool-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景图片 -->
    <div class="bg-container">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920&q=80" alt="海边日落风景">
    </div>
    <div class="bg-overlay"></div>

    <div class="container">
        <div class="tool-header">
            <div class="tool-icon" id="toolIcon">📦</div>
            <h1 class="tool-title" id="toolTitle">工具详情</h1>
            <p class="tool-description" id="toolDescription">正在加载工具...</p>
        </div>

        <!-- 工具面板 -->
        <div class="tool-panels">
            <!-- VIP视频解析 -->
            <div class="tool-panel" id="panel-vip">
                <div class="form-group">
                    <label for="vip-api">视频解析API:</label>
                    <select class="form-control" id="vip-api">
                        <option value="https://jxnfv.com/?url=">jxnfv</option>
                        <option value="https://www.jxlao.com/jx?url=">jxlao</option>
                        <option value="https://api.03964.com/vip/?url=">03964</option>
                        <option value="https://www.vipjiexi.com/yun?url=">vipjiexi</option>
                        <option value="https://api.baiyug.cn/vip/?url=">baiyug</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="vip-url">视频地址:</label>
                    <input type="text" class="form-control" id="vip-url" placeholder="请输入视频播放地址">

                    支持爱奇艺、优酷、腾讯等VIP视频解析，视频解析项目仅供学习使用。

            <!-- 傲星工具箱 -->

                <div class="form-group">
                    <label for="aoxing-tool">选择工具:</label>
                    <select class="form-control" id="aoxing-tool">
                        <option value="base64">Base64编码/解码</option>

            <!-- 默认工具面板（用于未配置的工具） -->

                    <p>该工具正在开发中，敬请期待！</p>

        <a href="index.html" class="back-button">返回工具箱</a>

    <script>
        // 获取URL参数中的工具ID
        function getToolId() {
            const urlParams = new URLSearchParams(window.location.search);
            // 修复URL参数获取，处理可能的编码问题
            const toolId = urlParams.get('tool') || 'vip';
            console.log('Raw toolId:', toolId);
            // 确保返回的是小写的工具ID
            return toolId.toLowerCase();
        }

        // 从API获取工具配置
        let toolsConfig = {};
        
        // API 基础 URL
        const API_BASE = 'https://jiexihoutai.farholme.com';
        
        // 获取工具配置
        async function fetchToolsConfig() {
            try {
                const response = await fetch(`${API_BASE}/api/tools`);
                if (response.ok) {
                    toolsConfig = await response.json();
                } else {
                    // 如果API请求失败，使用默认配置
                    toolsConfig = {
                        vip: {
                            icon: '🎬',
                            title: 'VIP视频解析',
                            description: '支持爱奇艺、优酷、腾讯等VIP视频解析'
                        },
                        m3u8: {
                            icon: '📹',
                            title: 'm3u8视频提取',
                            description: '提取在线视频的m3u8地址，方便下载和播放'
                        },
                        aoxing: {
                            icon: '🧰',
                            title: '傲星工具箱',
                            description: '多功能在线工具箱，包含Base64、URL编码解码等功能'
                        }
                    };
                }
            } catch (error) {
                // 网络错误时使用默认配置
                toolsConfig = {
                    vip: {
                        icon: '🎬',
                        title: 'VIP视频解析',
                        description: '支持爱奇艺、优酷、腾讯等VIP视频解析'
                    },
                    m3u8: {
                        icon: '📹',
                        title: 'm3u8视频提取',
                        description: '提取在线视频的m3u8地址，方便下载和播放'
                    },
                    aoxing: {
                        icon: '🧰',
                        title: '傲星工具箱',
                        description: '多功能在线工具箱，包含Base64、URL编码解码等功能'
                    }
                };
            }
        }

        // 初始化工具页面
        async function initToolPage() {
            // 先获取工具配置
            await fetchToolsConfig();
            
            const toolId = getToolId();
            console.log('Tool ID:', toolId);
            
            // 首先移除所有面板的active类
            document.querySelectorAll('.tool-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            
            // 直接根据toolId查找面板
            const targetPanel = document.getElementById('panel-' + toolId);
            console.log('Target Panel:', targetPanel);
            
            if (targetPanel) {
                // 尝试从配置中获取工具信息
                const config = toolsConfig[toolId];
                if (config) {
                    // 更新页面标题和描述
                    document.getElementById('toolIcon').textContent = config.icon;
                    document.getElementById('toolTitle').textContent = config.title;
                    document.getElementById('toolDescription').textContent = config.description;
                    document.title = config.title + ' - 小狐狸工具站';
                } else {
                    // 使用默认信息
                    document.getElementById('toolIcon').textContent = '📦';
                    document.getElementById('toolTitle').textContent = '工具详情';
                    document.getElementById('toolDescription').textContent = '工具已加载';
                    document.title = '工具详情 - 小狐狸工具站';
                }
                // 显示对应的工具面板
                targetPanel.classList.add('active');
            } else {
                // 如果工具面板不存在，显示VIP视频解析面板
                document.getElementById('toolIcon').textContent = '🎬';
                document.getElementById('toolTitle').textContent = 'VIP视频解析';
                document.getElementById('toolDescription').textContent = '支持爱奇艺、优酷、腾讯等VIP视频解析';
                document.title = 'VIP视频解析 - 小狐狸工具站';
                document.getElementById('panel-vip').classList.add('active');
            }
        }

        // VIP视频解析功能
        function startVipParse() {
            const api = document.getElementById('vip-api').value;
            const url = document.getElementById('vip-url').value;
            if (!url) {
                alert('请输入视频地址');
                return;
            }
            window.open(api + url, '_blank');
        }

        // URL编码解码功能
        function urlEncode() {
            const input = document.getElementById('url-input').value;
            try {
                const encoded = encodeURIComponent(input);
                document.getElementById('url-output').value = encoded;
            } catch(e) {
                document.getElementById('url-output').value = '编码错误: ' + e.message;
            }
        }

        function urlDecode() {
            const input = document.getElementById('url-input').value;
            try {
                const decoded = decodeURIComponent(input);
                document.getElementById('url-output').value = decoded;
            } catch(e) {
                document.getElementById('url-output').value = '解码错误: ' + e.message;
            }
        }

        // Base64转换功能
        function base64Encode() {
            const input = document.getElementById('base64-input').value;
            try {
                const encoded = btoa(unescape(encodeURIComponent(input)));
                document.getElementById('base64-output').value = encoded;
            } catch(e) {
                document.getElementById('base64-output').value = '编码错误: ' + e.message;
            }
        }

        function base64Decode() {
            const input = document.getElementById('base64-input').value;
            try {
                const decoded = decodeURIComponent(escape(atob(input)));
                document.getElementById('base64-output').value = decoded;
            } catch(e) {
                document.getElementById('base64-output').value = '解码错误: ' + e.message;
            }
        }

        // m3u8视频提取功能
        function startM3u8Extract() {
            const url = document.getElementById('m3u8-url').value.trim();
            if (!url) {
                alert('请输入视频地址');
                return;
            }
            
            // 简单的m3u8提取逻辑
            setTimeout(() => {
                const output = `提取的m3u8地址: ${url.replace(/\.mp4$/, '.m3u8')}`;
                alert('提取完成！\n' + output);
            }, 1000);
        }

        // 傲星工具箱功能
        function runAoxingTool() {
            const tool = document.getElementById('aoxing-tool').value;
            const input = document.getElementById('aoxing-input').value;
            const output = document.getElementById('aoxing-output');
            
            if (!input) {
                alert('请输入要处理的内容');
                return;
            }
            
            let result = '';
            
            switch (tool) {
                case 'base64':
                    // 尝试解码，如果失败则编码
                    try {
                        result = atob(input);
                    } catch (e) {
                        result = btoa(unescape(encodeURIComponent(input)));
                    }
                    break;
                case 'url':
                    // 尝试解码，如果失败则编码
                    try {
                        result = decodeURIComponent(input);
                    } catch (e) {
                        result = encodeURIComponent(input);
                    }
                    break;
                case 'json':
                    try {
                        const obj = JSON.parse(input);
                        result = JSON.stringify(obj, null, 2);
                    } catch (e) {
                        result = 'JSON格式错误';
                    }
                    break;
                case 'timestamp':
                    // 尝试转换时间戳
                    if (!isNaN(input)) {
                        result = new Date(parseInt(input) * 1000).toLocaleString();
                    } else {
                        result = Math.floor(new Date(input).getTime() / 1000).toString();
                    }
                    break;
            }
            
            output.value = result;
        }

        // 时间戳转换功能
        function timestampToDate() {
            const timestamp = document.getElementById('timestamp-input').value;
            if (!timestamp) {
                alert('请输入时间戳');
                return;
            }
            const date = new Date(parseInt(timestamp) * 1000);
            document.getElementById('timestamp-output').value = date.toLocaleString();
        }

        function dateToTimestamp() {
            const dateInput = document.getElementById('datetime-input').value;
            if (!dateInput) {
                alert('请选择日期时间');
                return;
            }
            const date = new Date(dateInput);
            document.getElementById('timestamp-output').value = Math.floor(date.getTime() / 1000);
        }

        function getCurrentTimestamp() {
            const timestamp = Math.floor(Date.now() / 1000);
            document.getElementById('timestamp-input').value = timestamp;
            document.getElementById('timestamp-output').value = new Date(timestamp * 1000).toLocaleString();
        }

        // JSON格式化功能
        function formatJSON() {
            const input = document.getElementById('json-input').value;
            try {
                const obj = JSON.parse(input);
                document.getElementById('json-output').value = JSON.stringify(obj, null, 2);
            } catch(e) {
                document.getElementById('json-output').value = 'JSON格式错误: ' + e.message;
            }
        }

        function minifyJSON() {
            const input = document.getElementById('json-input').value;
            try {
                const obj = JSON.parse(input);
                document.getElementById('json-output').value = JSON.stringify(obj);
            } catch(e) {
                document.getElementById('json-output').value = 'JSON格式错误: ' + e.message;
            }
        }

        // 二维码生成功能（使用Google Chart API）
        function generateQRCode() {
            const content = document.getElementById('qrcode-content').value;
            const size = document.getElementById('qrcode-size').value;
            if (!content) {
                alert('请输入内容');
                return;
            }
            const container = document.getElementById('qrcode-container');
            const qrUrl = `https://chart.googleapis.com/chart?cht=qr&chs=${size}x${size}&chl=${encodeURIComponent(content)}`;
            container.innerHTML = `<img src="${qrUrl}" alt="二维码" style="max-width: 100%;">`;
        }

        // 密码生成功能
        function generatePassword() {
            const length = parseInt(document.getElementById('password-length').value);
            const includeUppercase = document.getElementById('include-uppercase').checked;
            const includeLowercase = document.getElementById('include-lowercase').checked;
            const includeNumbers = document.getElementById('include-numbers').checked;
            const includeSymbols = document.getElementById('include-symbols').checked;

            let chars = '';
            if (includeUppercase) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (includeLowercase) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (includeNumbers) chars += '0123456789';
            if (includeSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (chars === '') {
                alert('请至少选择一种字符类型');
                return;
            }

            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password-output').value = password;
        }

        // 颜色转换功能
        function convertColor() {
            const input = document.getElementById('color-input').value.trim();
            if (!input) {
                alert('请输入颜色值');
                return;
            }

            let r, g, b;

            // 处理HEX格式
            if (input.startsWith('#')) {
                const hex = input.slice(1);
                if (hex.length === 3) {
                    r = parseInt(hex[0] + hex[0], 16);
                    g = parseInt(hex[1] + hex[1], 16);
                    b = parseInt(hex[2] + hex[2], 16);
                } else if (hex.length === 6) {
                    r = parseInt(hex.slice(0, 2), 16);
                    g = parseInt(hex.slice(2, 4), 16);
                    b = parseInt(hex.slice(4, 6), 16);
                }
            }
            // 处理RGB格式
            else if (input.startsWith('rgb')) {
                const match = input.match(/\d+/g);
                if (match && match.length >= 3) {
                    r = parseInt(match[0]);
                    g = parseInt(match[1]);
                    b = parseInt(match[2]);
                }
            }

            if (r !== undefined && g !== undefined && b !== undefined) {
                // 更新颜色预览
                document.getElementById('color-preview').style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
                
                // 转换为不同格式
                const hex = `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
                const rgb = `rgb(${r}, ${g}, ${b})`;
                
                // 计算HSL
                const hsl = rgbToHsl(r, g, b);
                
                const result = `HEX: ${hex}\nRGB: ${rgb}\nHSL: hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
                document.getElementById('color-output').value = result;
            } else {
                document.getElementById('color-output').value = '无效的颜色值';
            }
        }

        // RGB转HSL
        function rgbToHsl(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0; // 灰色
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }

            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }

        // 简繁转换功能
        function convertToTraditional() {
            const input = document.getElementById('zh-input').value;
            // 这里使用简单的映射，实际项目中可以使用更完整的转换库
            const simplifiedToTraditional = {
                '一': '壹', '二': '貳', '三': '參', '四': '肆', '五': '伍',
                '六': '陸', '七': '柒', '八': '捌', '九': '玖', '十': '拾',
                '百': '佰', '千': '仟', '万': '萬', '亿': '億', '个': '個',
                '人': '人', '大': '大', '中': '中', '小': '小', '上': '上',
                '下': '下', '左': '左', '右': '右', '前': '前', '后': '後',
                '来': '來', '去': '去', '天': '天', '地': '地', '日': '日',
                '月': '月', '星': '星', '山': '山', '水': '水', '火': '火',
                '土': '土', '金': '金', '木': '木', '石': '石', '草': '草'
            };
            let result = input;
            for (const [simplified, traditional] of Object.entries(simplifiedToTraditional)) {
                result = result.replace(new RegExp(simplified, 'g'), traditional);
            }
            document.getElementById('zh-output').value = result;
        }

        function convertToSimplified() {
            const input = document.getElementById('zh-input').value;
            // 这里使用简单的映射，实际项目中可以使用更完整的转换库
            const traditionalToSimplified = {
                '壹': '一', '貳': '二', '參': '三', '肆': '四', '伍': '五',
                '陸': '六', '柒': '七', '捌': '八', '玖': '九', '拾': '十',
                '佰': '百', '仟': '千', '萬': '万', '億': '亿', '個': '个',
                '後': '后', '來': '来'
            };
            let result = input;
            for (const [traditional, simplified] of Object.entries(traditionalToSimplified)) {
                result = result.replace(new RegExp(traditional, 'g'), simplified);
            }
            document.getElementById('zh-output').value = result;
        }

        // ASS字幕工具功能
        function optimizeASS() {
            const content = document.getElementById('ass-content').value;
            if (!content) {
                alert('请输入ASS字幕内容');
                return;
            }
            // 简单的ASS字幕优化逻辑
            let optimized = content

        // 罗马数字转换功能
        function arabicToRoman() {
            const input = parseInt(document.getElementById('roman-input').value);
            if (isNaN(input) || input < 1 || input > 3999) {
                alert('请输入1-3999之间的数字');
                return;
            }
            
            const romanNumerals = [
                { value: 1000, symbol: 'M' },
                { value: 900, symbol: 'CM' },
                { value: 500, symbol: 'D' },
                { value: 400, symbol: 'CD' },
                { value: 100, symbol: 'C' },
                { value: 90, symbol: 'XC' },
                { value: 50, symbol: 'L' },
                { value: 40, symbol: 'XL' },
                { value: 10, symbol: 'X' },
                { value: 9, symbol: 'IX' },
                { value: 5, symbol: 'V' },
                { value: 4, symbol: 'IV' },
                { value: 1, symbol: 'I' }
            ];
            
            let result = '';
            let num = input;
            for (const { value, symbol } of romanNumerals) {
                while (num >= value) {
                    result += symbol;
                    num -= value;
                }
            }
            document.getElementById('roman-output').value = result;
        }

        function romanToArabic() {
            const input = document.getElementById('roman-input').value.toUpperCase();
            const romanValues = {
                'I': 1,
                'V': 5,
                'X': 10,
                'L': 50,
                'C': 100,
                'D': 500,
                'M': 1000
            };
            
            let result = 0;
            let prevValue = 0;
            for (let i = input.length - 1; i >= 0; i--) {
                const currentValue = romanValues[input[i]];
                if (currentValue < prevValue) {
                    result -= currentValue;
                } else {
                    result += currentValue;
                }
                prevValue = currentValue;
            }
            document.getElementById('roman-output').value = result;
        }

        function markdownToHtml() {
            const input = document.getElementById('markdown-input').value;
            // 简单的Markdown转HTML逻辑
            let html = input
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/\*(.*?)\*/gim, '<em>$1</em>')
                .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
                .replace(/\[(.*?)\]\((.*?)\)/gim, '<a href="$2">$1</a>')
                .replace(/^- (.*$)/gim, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                .replace(/\n\n/gim, '</p><p>')
                .replace(/^(?!<[hlu])(.*$)/gim, '<p>$1</p>');
            document.getElementById('markdown-output').value = html;
        }

        function updateChronometerDisplay() {
            const hours = Math.floor(chronometerSeconds / 3600);
            const minutes = Math.floor((chronometerSeconds % 3600) / 60);
            const seconds = chronometerSeconds % 60;
            const display = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('chronometer-display').textContent = display;

        // 温度转换功能
        function convertTemperature() {
            const value = parseFloat(document.getElementById('temperature-value').value);
            const fromUnit = document.getElementById('temperature-from').value;
            const toUnit = document.getElementById('temperature-to').value;
            
            if (isNaN(value)) {
                alert('请输入有效的温度值');
                return;
            }
            
            let result;
            if (fromUnit === toUnit) {
                result = value;
            } else if (fromUnit === 'celsius') {
                if (toUnit === 'fahrenheit') {
                    result = (value * 9/5) + 32;
                } else if (toUnit === 'kelvin') {
                    result = value + 273.15;
                }
            } else if (fromUnit === 'fahrenheit') {
                if (toUnit === 'celsius') {
                    result = (value - 32) * 5/9;
                } else if (toUnit === 'kelvin') {
                    result = (value - 32) * 5/9 + 273.15;
                }
            } else if (fromUnit === 'kelvin') {
                if (toUnit === 'celsius') {
                    result = value - 273.15;
                } else if (toUnit === 'fahrenheit') {
                    result = (value - 273.15) * 9/5 + 32;
                }
            }
            
            document.getElementById('temperature-output').value = `${value} ${getUnitSymbol(fromUnit)} = ${result.toFixed(2)} ${getUnitSymbol(toUnit)}`;
        }

        function getUnitSymbol(unit) {
            switch (unit) {
                case 'celsius': return '°C';
                case 'fahrenheit': return '°F';
                case 'kelvin': return 'K';
                default: return '';
            }
        }

        // 密码强度检测功能
        function checkPasswordStrength() {
            const password = document.getElementById('passwordstrength-input').value;
            if (!password) {
                alert('请输入密码');
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength += 25;
            if (/[A-Z]/.test(password)) strength += 25;
            if (/[a-z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password)) strength += 25;
            if (/[^A-Za-z0-9]/.test(password)) strength += 10;
            
            const indicator = document.querySelector('#passwordstrength-indicator .progress-bar');
            indicator.style.width = `${strength}%`;
            
            let strengthText;
            if (strength < 25) {
                strengthText = '弱';
                indicator.className = 'progress-bar progress-bar-danger';
            } else if (strength < 50) {
                strengthText = '一般';
                indicator.className = 'progress-bar progress-bar-warning';
            } else if (strength < 75) {
                strengthText = '良好';
                indicator.className = 'progress-bar progress-bar-info';
            } else {
                strengthText = '强';
                indicator.className = 'progress-bar progress-bar-success';
            }
            
            document.getElementById('passwordstrength-output').value = `密码强度: ${strengthText} (${strength}%)`;
        }

        // 哈希计算功能
        function computeHash(algorithm) {
            const input = document.getElementById('hash-input').value;
            if (!input) {
                alert('请输入要计算哈希的文本');
                return;
            }
            
            // 简单的哈希计算逻辑
            let hash = 0;
            for (let i = 0; i < input.length; i++) {
                const char = input.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            
            let result;
            switch (algorithm) {
                case 'md5':
                    result = 'MD5: ' + Math.abs(hash).toString(16).padStart(32, '0');
                    break;
                case 'sha1':
                    result = 'SHA1: ' + Math.abs(hash).toString(16).padStart(40, '0');
                    break;
                case 'sha256':
                    result = 'SHA256: ' + Math.abs(hash).toString(16).padStart(64, '0');
                    break;
                case 'sha512':
                    result = 'SHA512: ' + Math.abs(hash).toString(16).padStart(128, '0');
                    break;
                default:
                    result = '未知算法';
            }
            
            document.getElementById('hash-output').value = result;
        }

        // UUID生成功能
        function generateUUID() {
            const version = document.getElementById('uuid-version').value;
            let uuid;
            
            if (version === 'v1') {
                // 简单的时间戳UUID
                const timestamp = Date.now().toString(16);
                const random = Math.random().toString(16).substr(2, 12);
                uuid = `${timestamp}-${random.substr(0, 4)}-1${random.substr(4, 3)}-${random.substr(7, 4)}-${random.substr(11, 12)}`;
            } else {
                // 随机UUID
                uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            }
            
            document.getElementById('uuid-output').value = uuid;
        }
