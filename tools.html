<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具详情 - 小狐狸工具站</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .bg-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
        
        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .tool-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .tool-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .tool-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        
        .tool-description {
            font-size: 16px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .tool-panel {
            display: none;
        }
        
        .tool-panel.active {
            display: block;
        }
        
        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                margin: 30px;
                padding: 20px;
            }
            
            .tool-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景图片 -->
    <div class="bg-container">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920&q=80" alt="海边日落风景">
    </div>
    <div class="bg-overlay"></div>

    <div class="container">
        <div class="tool-header">
            <div class="tool-icon" id="toolIcon">📦</div>
            <h1 class="tool-title" id="toolTitle">工具详情</h1>
            <p class="tool-description" id="toolDescription">正在加载工具...</p>
        </div>

        <!-- 工具面板 -->
        <div class="tool-panels">
            <!-- VIP视频解析 -->
            <div class="tool-panel" id="panel-vip">
                <div class="form-group">
                    <label for="vip-api">视频解析API:</label>
                    <select class="form-control" id="vip-api">
                        <option value="https://jxnfv.com/?url=">jxnfv</option>
                        <option value="https://www.jxlao.com/jx?url=">jxlao</option>
                        <option value="https://api.03964.com/vip/?url=">03964</option>
                        <option value="https://www.vipjiexi.com/yun?url=">vipjiexi</option>
                        <option value="https://api.baiyug.cn/vip/?url=">baiyug</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="vip-url">视频地址:</label>
                    <input type="text" class="form-control" id="vip-url" placeholder="请输入视频播放地址">
                </div>
                <button class="btn btn-primary btn-block" onclick="startVipParse()" style="background: linear-gradient(135deg, #667eea, #764ba2); border: none;">
                    开始解析
                </button>
                <div class="alert alert-info mt-3">
                    支持爱奇艺、优酷、腾讯等VIP视频解析，视频解析项目仅供学习使用。
                </div>
            </div>

            <!-- URL编码解码 -->
            <div class="tool-panel" id="panel-url">
                <div class="form-group">
                    <label>输入文本:</label>
                    <textarea class="form-control" id="url-input" rows="3" placeholder="请输入要转换的文本"></textarea>
                </div>
                <div class="form-group">
                    <label>转换结果:</label>
                    <textarea class="form-control" id="url-output" rows="3" readonly></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <button class="btn btn-primary btn-block" onclick="urlEncode()">编码</button>
                    </div>
                    <div class="col-md-6">
                        <button class="btn btn-success btn-block" onclick="urlDecode()">解码</button>
                    </div>
                </div>
            </div>

            <!-- Base64转换 -->
            <div class="tool-panel" id="panel-base64">
                <div class="form-group">
                    <label>输入文本:</label>
                    <textarea class="form-control" id="base64-input" rows="4" placeholder="请输入要转换的文本"></textarea>
                </div>
                <div class="form-group">
                    <label>转换结果:</label>
                    <textarea class="form-control" id="base64-output" rows="4" readonly></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <button class="btn btn-primary btn-block" onclick="base64Encode()">编码</button>
                    </div>
                    <div class="col-md-6">
                        <button class="btn btn-success btn-block" onclick="base64Decode()">解码</button>
                    </div>
                </div>
            </div>

            <!-- 时间戳转换 -->
            <div class="tool-panel" id="panel-timestamp">
                <div class="form-group">
                    <label>时间戳:</label>
                    <input type="text" class="form-control" id="timestamp-input" placeholder="请输入时间戳">
                </div>
                <div class="form-group">
                    <label>日期时间:</label>
                    <input type="datetime-local" class="form-control" id="datetime-input">
                </div>
                <div class="form-group">
                    <label>转换结果:</label>
                    <textarea class="form-control" id="timestamp-output" rows="2" readonly></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <button class="btn btn-primary btn-block" onclick="timestampToDate()">时间戳转日期</button>
                    </div>
                    <div class="col-md-6">
                        <button class="btn btn-success btn-block" onclick="dateToTimestamp()">日期转时间戳</button>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <button class="btn btn-info" onclick="getCurrentTimestamp()">获取当前时间戳</button>
                </div>
            </div>

            <!-- JSON格式化 -->
            <div class="tool-panel" id="panel-json">
                <div class="form-group">
                    <label>输入JSON:</label>
                    <textarea class="form-control" id="json-input" rows="4" placeholder="请输入JSON字符串"></textarea>
                </div>
                <div class="form-group">
                    <label>格式化结果:</label>
                    <textarea class="form-control" id="json-output" rows="4" readonly></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <button class="btn btn-primary btn-block" onclick="formatJSON()">格式化</button>
                    </div>
                    <div class="col-md-6">
                        <button class="btn btn-success btn-block" onclick="minifyJSON()">压缩</button>
                    </div>
                </div>
            </div>

            <!-- 二维码生成 -->
            <div class="tool-panel" id="panel-qrcode">
                <div class="form-group">
                    <label>输入内容:</label>
                    <textarea class="form-control" id="qrcode-content" rows="3" placeholder="请输入要生成二维码的内容"></textarea>
                </div>
                <div class="form-group">
                    <label>二维码大小:</label>
                    <input type="number" class="form-control" id="qrcode-size" value="200" min="100" max="500">
                </div>
                <div class="text-center">
                    <div id="qrcode-container" class="mt-3 mb-3"></div>
                    <button class="btn btn-primary btn-block" onclick="generateQRCode()">生成二维码</button>
                </div>
            </div>

            <!-- 密码生成器 -->
            <div class="tool-panel" id="panel-password">
                <div class="form-group">
                    <label>密码长度:</label>
                    <input type="number" class="form-control" id="password-length" value="12" min="6" max="50">
                </div>
                <div class="form-group">
                    <label>包含选项:</label>
                    <div class="checkbox">
                        <label><input type="checkbox" id="include-uppercase" checked> 大写字母</label>
                    </div>
                    <div class="checkbox">
                        <label><input type="checkbox" id="include-lowercase" checked> 小写字母</label>
                    </div>
                    <div class="checkbox">
                        <label><input type="checkbox" id="include-numbers" checked> 数字</label>
                    </div>
                    <div class="checkbox">
                        <label><input type="checkbox" id="include-symbols" checked> 特殊字符</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>生成结果:</label>
                    <input type="text" class="form-control" id="password-output" readonly>
                </div>
                <button class="btn btn-primary btn-block" onclick="generatePassword()">生成密码</button>
            </div>

            <!-- 颜色转换 -->
            <div class="tool-panel" id="panel-color">
                <div class="form-group">
                    <label>颜色值:</label>
                    <input type="text" class="form-control" id="color-input" placeholder="请输入颜色值 (HEX/RGB/HSL)">
                </div>
                <div class="form-group">
                    <label>颜色预览:</label>
                    <div id="color-preview" style="height: 60px; background-color: #667eea; border-radius: 4px;"></div>
                </div>
                <div class="form-group">
                    <label>转换结果:</label>
                    <textarea class="form-control" id="color-output" rows="3" readonly></textarea>
                </div>
                <button class="btn btn-primary btn-block" onclick="convertColor()">转换颜色</button>
            </div>

            <!-- 文本工具 -->
            <div class="tool-panel" id="panel-text">
                <div class="form-group">
                    <label>输入文本:</label>
                    <textarea class="form-control" id="text-input" rows="4" placeholder="请输入文本"></textarea>
                </div>
                <div class="form-group">
                    <label>处理结果:</label>
                    <textarea class="form-control" id="text-output" rows="4" readonly></textarea>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <button class="btn btn-default btn-block" onclick="textToUpper()">转大写</button>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-default btn-block" onclick="textToLower()">转小写</button>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-default btn-block" onclick="textReverse()">反转</button>
                    </div>
                </div>
            </div>

            <!-- 默认工具面板（用于未配置的工具） -->
            <div class="tool-panel" id="panel-default">
                <div class="alert alert-info">
                    <h4>工具正在开发中</h4>
                    <p>该工具功能正在完善中，敬请期待！</p>
                </div>
            </div>
        </div>

        <a href="index.html" class="back-button">返回工具箱</a>
    </div>

    <script>
        // 获取URL参数中的工具ID
        function getToolId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('tool') || 'vip';
        }

        // 工具配置
        const toolsConfig = {
            vip: {
                icon: '🎬',
                title: 'VIP视频解析',
                description: '支持爱奇艺、优酷、腾讯等VIP视频解析'
            },
            url: {
                icon: '🔗',
                title: 'URL编码解码',
                description: '在线URL编码和解码工具'
            },
            base64: {
                icon: '🔢',
                title: 'Base64转换',
                description: '在线Base64编码和解码工具'
            },
            timestamp: {
                icon: '⏰',
                title: '时间戳转换',
                description: '在线时间戳和日期相互转换'
            },
            json: {
                icon: '🔧',
                title: 'JSON格式化',
                description: '在线JSON格式化和验证工具'
            },
            qrcode: {
                icon: '📱',
                title: '二维码生成',
                description: '在线二维码生成工具'
            },
            password: {
                icon: '🔐',
                title: '密码生成器',
                description: '生成安全随机密码'
            },
            color: {
                icon: '🎨',
                title: '颜色转换',
                description: '在线颜色格式转换工具'
            },
            text: {
                icon: '📝',
                title: '文本工具',
                description: '文本处理和转换工具'
            }
        };

        // 初始化工具页面
        function initToolPage() {
            const toolId = getToolId();
            const config = toolsConfig[toolId];
            
            if (config) {
                // 更新页面标题和描述
                document.getElementById('toolIcon').textContent = config.icon;
                document.getElementById('toolTitle').textContent = config.title;
                document.getElementById('toolDescription').textContent = config.description;
                document.title = config.title + ' - 小狐狸工具站';
                
                // 显示对应的工具面板
                document.querySelectorAll('.tool-panel').forEach(panel => {
                    panel.classList.remove('active');
                });
                const targetPanel = document.getElementById('panel-' + toolId);
                if (targetPanel) {
                    targetPanel.classList.add('active');
                } else {
                    // 如果工具面板不存在，显示默认面板
                    document.getElementById('panel-default').classList.add('active');
                }
            } else {
                // 如果工具配置不存在，显示默认面板
                document.getElementById('toolIcon').textContent = '📦';
                document.getElementById('toolTitle').textContent = '工具详情';
                document.getElementById('toolDescription').textContent = '该工具正在开发中';
                document.getElementById('panel-default').classList.add('active');
            }
        }

        // VIP视频解析功能
        function startVipParse() {
            const api = document.getElementById('vip-api').value;
            const url = document.getElementById('vip-url').value;
            if (!url) {
                alert('请输入视频地址');
                return;
            }
            window.open(api + url, '_blank');
        }

        // URL编码解码功能
        function urlEncode() {
            const input = document.getElementById('url-input').value;
            try {
                const encoded = encodeURIComponent(input);
                document.getElementById('url-output').value = encoded;
            } catch(e) {
                document.getElementById('url-output').value = '编码错误: ' + e.message;
            }
        }

        function urlDecode() {
            const input = document.getElementById('url-input').value;
            try {
                const decoded = decodeURIComponent(input);
                document.getElementById('url-output').value = decoded;
            } catch(e) {
                document.getElementById('url-output').value = '解码错误: ' + e.message;
            }
        }

        // Base64转换功能
        function base64Encode() {
            const input = document.getElementById('base64-input').value;
            try {
                const encoded = btoa(unescape(encodeURIComponent(input)));
                document.getElementById('base64-output').value = encoded;
            } catch(e) {
                document.getElementById('base64-output').value = '编码错误: ' + e.message;
            }
        }

        function base64Decode() {
            const input = document.getElementById('base64-input').value;
            try {
                const decoded = decodeURIComponent(escape(atob(input)));
                document.getElementById('base64-output').value = decoded;
            } catch(e) {
                document.getElementById('base64-output').value = '解码错误: ' + e.message;
            }
        }

        // 时间戳转换功能
        function timestampToDate() {
            const timestamp = document.getElementById('timestamp-input').value;
            if (!timestamp) {
                alert('请输入时间戳');
                return;
            }
            const date = new Date(parseInt(timestamp) * 1000);
            document.getElementById('timestamp-output').value = date.toLocaleString();
        }

        function dateToTimestamp() {
            const dateInput = document.getElementById('datetime-input').value;
            if (!dateInput) {
                alert('请选择日期时间');
                return;
            }
            const date = new Date(dateInput);
            document.getElementById('timestamp-output').value = Math.floor(date.getTime() / 1000);
        }

        function getCurrentTimestamp() {
            const timestamp = Math.floor(Date.now() / 1000);
            document.getElementById('timestamp-input').value = timestamp;
            document.getElementById('timestamp-output').value = new Date(timestamp * 1000).toLocaleString();
        }

        // JSON格式化功能
        function formatJSON() {
            const input = document.getElementById('json-input').value;
            try {
                const obj = JSON.parse(input);
                document.getElementById('json-output').value = JSON.stringify(obj, null, 2);
            } catch(e) {
                document.getElementById('json-output').value = 'JSON格式错误: ' + e.message;
            }
        }

        function minifyJSON() {
            const input = document.getElementById('json-input').value;
            try {
                const obj = JSON.parse(input);
                document.getElementById('json-output').value = JSON.stringify(obj);
            } catch(e) {
                document.getElementById('json-output').value = 'JSON格式错误: ' + e.message;
            }
        }

        // 二维码生成功能（使用Google Chart API）
        function generateQRCode() {
            const content = document.getElementById('qrcode-content').value;
            const size = document.getElementById('qrcode-size').value;
            if (!content) {
                alert('请输入内容');
                return;
            }
            const container = document.getElementById('qrcode-container');
            const qrUrl = `https://chart.googleapis.com/chart?cht=qr&chs=${size}x${size}&chl=${encodeURIComponent(content)}`;
            container.innerHTML = `<img src="${qrUrl}" alt="二维码" style="max-width: 100%;">`;
        }

        // 密码生成功能
        function generatePassword() {
            const length = parseInt(document.getElementById('password-length').value);
            const includeUppercase = document.getElementById('include-uppercase').checked;
            const includeLowercase = document.getElementById('include-lowercase').checked;
            const includeNumbers = document.getElementById('include-numbers').checked;
            const includeSymbols = document.getElementById('include-symbols').checked;

            let chars = '';
            if (includeUppercase) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (includeLowercase) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (includeNumbers) chars += '0123456789';
            if (includeSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (chars === '') {
                alert('请至少选择一种字符类型');
                return;
            }

            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password-output').value = password;
        }

        // 颜色转换功能
        function convertColor() {
            const input = document.getElementById('color-input').value.trim();
            if (!input) {
                alert('请输入颜色值');
                return;
            }

            let r, g, b;

            // 处理HEX格式
            if (input.startsWith('#')) {
                const hex = input.slice(1);
                if (hex.length === 3) {
                    r = parseInt(hex[0] + hex[0], 16);
                    g = parseInt(hex[1] + hex[1], 16);
                    b = parseInt(hex[2] + hex[2], 16);
                } else if (hex.length === 6) {
                    r = parseInt(hex.slice(0, 2), 16);
                    g = parseInt(hex.slice(2, 4), 16);
                    b = parseInt(hex.slice(4, 6), 16);
                }
            }
            // 处理RGB格式
            else if (input.startsWith('rgb')) {
                const match = input.match(/\d+/g);
                if (match && match.length >= 3) {
                    r = parseInt(match[0]);
                    g = parseInt(match[1]);
                    b = parseInt(match[2]);
                }
            }

            if (r !== undefined && g !== undefined && b !== undefined) {
                const hex = '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                const rgb = `rgb(${r}, ${g}, ${b})`;
                document.getElementById('color-preview').style.backgroundColor = hex;
                document.getElementById('color-output').value = `HEX: ${hex}\nRGB: ${rgb}`;
            } else {
                document.getElementById('color-output').value = '无法识别的颜色格式';
            }
        }

        // 文本工具功能
        function textToUpper() {
            const input = document.getElementById('text-input').value;
            document.getElementById('text-output').value = input.toUpperCase();
        }

        function textToLower() {
            const input = document.getElementById('text-input').value;
            document.getElementById('text-output').value = input.toLowerCase();
        }

        function textReverse() {
            const input = document.getElementById('text-input').value;
            document.getElementById('text-output').value = input.split('').reverse().join('');
        }

        // 页面加载完成后初始化
        window.onload = function() {
            initToolPage();
        };
    </script>
</body>
</html>
